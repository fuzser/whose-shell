name: Build Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      include_windows_arm64:
        description: "Also try the experimental Windows ARM64 artifact."
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win-x64
            os: windows-latest
            install-extra: ".[dev,packaging,terminal-windows]"
          - target: linux-amd64
            os: ubuntu-latest
            install-extra: ".[dev,packaging]"
          - target: macos-arm64
            os: macos-latest
            install-extra: ".[dev,packaging]"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "${{ matrix.install-extra }}"

      - name: Run tests
        run: python -m pytest

      - name: Build artifact
        run: python packaging/pyinstaller_build.py --target "${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whose-shell-${{ matrix.target }}
          path: release_artifacts/*
          if-no-files-found: error

  build-windows-arm64:
    name: Build win-arm64
    if: github.event_name == 'workflow_dispatch' && inputs.include_windows_arm64
    runs-on: windows-11-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,packaging,terminal-windows]"

      - name: Run tests
        run: python -m pytest

      - name: Build artifact
        run: python packaging/pyinstaller_build.py --target win-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whose-shell-win-arm64
          path: release_artifacts/*
          if-no-files-found: error

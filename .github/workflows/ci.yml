name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "$RUNNER_OS" = "Windows" ]; then
            python -m pip install -e ".[dev,terminal-windows]"
          else
            python -m pip install -e ".[dev]"
          fi

      - name: Run tests
        run: python -m pytest
